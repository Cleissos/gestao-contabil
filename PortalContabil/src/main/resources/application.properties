spring.application.name=PortalContabil

# ==========================================
# CONFIGURA«√O DO BANCO DE DADOS (Din‚mico para Render/Local)
# ==========================================
# Se houver a vari·vel DB_URL (na Render), usa ela. Se n„o, usa o localhost.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/portal_contabil}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Garante que o Hibernate trate UUIDs corretamente no Postgres
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

